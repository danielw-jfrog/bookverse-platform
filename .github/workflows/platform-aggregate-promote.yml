name: Platform Aggregate & Promote

concurrency:
  group: platform-aggregate-promote
  cancel-in-progress: false

on:
  schedule:
    - cron: '0 9 */14 * 1'
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for manual platform aggregation'
        required: false
        default: 'Manual hotfix or testing'
        type: string
      create_version:
        description: "Create platform application version"
        required: false
        default: true
        type: boolean
      auto_promote:
        description: "Automatically promote through all stages to PROD"
        required: false
        default: true
        type: boolean
      preview_only:
        description: "Preview only (no writes)"
        required: false
        default: false
        type: boolean
      inventory_version:
        description: "Force inventory version (optional)"
        required: false
        type: string
      recommendations_version:
        description: "Force recommendations version (optional)"
        required: false
        type: string
      checkout_version:
        description: "Force checkout version (optional)"
        required: false
        type: string
      web_version:
        description: "Force web version (optional)"
        required: false
        type: string

jobs:
  aggregate:
    name: "Platform Aggregation"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    outputs:
      platform_version: ${{ steps.create-version.outputs.platform_version }}
      manifest_created: ${{ steps.create-version.outputs.manifest_created }}
    defaults:
      run:
        shell: bash
    steps:
      - name: "[Setup] Checkout"
        uses: actions/checkout@v4

      - name: "[Setup] Checkout bookverse-infra for shared scripts"
        uses: actions/checkout@v4
        with:
          repository: 'tomjfrog/bookverse-infra'
          ref: 'main'
          path: 'bookverse-infra'

      - name: "[Setup] Python Environment"
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: "[Setup] JFrog CLI"
        uses: jfrog/setup-jfrog-cli@v4
        with:
          version: 2.88.0
        id: jfrog-cli-auth
        with:
          oidc-provider-name: bookverse-platform-github
          oidc-audience: ${{ vars.JFROG_URL }}
        env:
          JF_URL: ${{ vars.JFROG_URL }}
          JF_PROJECT: ${{ vars.PROJECT_KEY }}

      - name: "[Setup] Install Python dependencies"
        run: |
          pip install --user PyYAML setuptools wheel
          echo "✅ Python dependencies installed"

      - name: "[Run] Create version and write manifest"
        id: collect-versions
        env:
          JFROG_URL: "${{ vars.JFROG_URL }}"
          JF_OIDC_TOKEN: "${{ steps.jfrog-cli-auth.outputs.oidc-token }}"
        run: |
          set -euo pipefail
          ARGS="--config config/services.yaml --output-dir manifests --source-stage PROD"
          if [[ -n "${{ inputs.inventory_version }}" ]]; then ARGS="$ARGS --override inventory=${{ inputs.inventory_version }}"; fi
          if [[ -n "${{ inputs.recommendations_version }}" ]]; then ARGS="$ARGS --override recommendations=${{ inputs.recommendations_version }}"; fi
          if [[ -n "${{ inputs.checkout_version }}" ]]; then ARGS="$ARGS --override checkout=${{ inputs.checkout_version }}"; fi
          if [[ -n "${{ inputs.web_version }}" ]]; then ARGS="$ARGS --override web=${{ inputs.web_version }}"; fi
          python -m app.main $ARGS | tee release_output.txt

      - name: "[Extract] Platform version from output"
        id: create-version
        if: ${{ inputs.create_version != false && inputs.preview_only != true }}
        run: |
          set -euo pipefail
          PLATFORM_VERSION=$(grep -o '"platform_app_version": "[^"]*"' release_output.txt | sed 's/"platform_app_version": "//; s/"//' | head -1)
          if [[ -z "$PLATFORM_VERSION" ]]; then
            echo "❌ Could not extract platform version from output"
            exit 1
          fi
          echo "platform_version=$PLATFORM_VERSION" >> $GITHUB_OUTPUT
          echo "manifest_created=true" >> $GITHUB_OUTPUT
          echo "✅ Platform application version created: $PLATFORM_VERSION"


      - name: "[Summary] Aggregation"
        run: |
          echo "## 🏗️ Platform Aggregation Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Platform Version:** \`${{ steps.create-version.outputs.platform_version }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Workflow:** \`${{ github.workflow }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📋 Details" >> $GITHUB_STEP_SUMMARY
          echo "- Platform aggregation completed successfully" >> $GITHUB_STEP_SUMMARY
          echo "- Service versions collected from PROD stage" >> $GITHUB_STEP_SUMMARY
          echo "- Platform manifest generated" >> $GITHUB_STEP_SUMMARY

  promote:
    name: "Auto-Promote Platform"
    needs: aggregate
    if: ${{ needs.aggregate.outputs.manifest_created == 'true' && inputs.auto_promote != false && inputs.preview_only != true }}
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    permissions:
      contents: read
      id-token: write
    env:
      JFROG_URL: ${{ vars.JFROG_URL }}
    steps:
      - name: "[Setup] Checkout"
        uses: actions/checkout@v4

      - name: "[Setup] Checkout bookverse-infra for shared promotion library"
        uses: actions/checkout@v4
        with:
          repository: 'tomjfrog/bookverse-infra'
          ref: 'main'
          path: 'bookverse-infra'

      - name: "[Setup] Python"
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: "[Setup] Install Python dependencies"
        run: |
          pip install --user PyYAML setuptools wheel
          echo "✅ Python dependencies installed"

      - name: "[Setup] JFrog CLI"
        uses: jfrog/setup-jfrog-cli@v4
        with:
          version: 2.88.0
        id: jfrog-cli-auth
        with:
          oidc-provider-name: bookverse-platform-github
          oidc-audience: ${{ vars.JFROG_URL }}
        env:
          JF_URL: ${{ vars.JFROG_URL }}
          JF_PROJECT: ${{ vars.PROJECT_KEY }}

      - name: "[Setup] Configure JFrog CLI"
        run: |
          jf c add --interactive=false --url "${{ vars.JFROG_URL }}" --access-token ""
          echo "✅ JFrog CLI configured"

      - name: "[Setup] Promotion Environment"
        env:
          APPLICATION_KEY: "bookverse-platform"
          APP_VERSION: "${{ needs.aggregate.outputs.platform_version }}"
          JFROG_URL: "${{ vars.JFROG_URL }}"
          PROJECT_KEY: "${{ vars.PROJECT_KEY }}"
          JF_OIDC_TOKEN: "${{ steps.jfrog-cli-auth.outputs.oidc-token }}"
          STAGES_STR: "DEV QA STAGING"
          FINAL_STAGE: "STAGING"
          ALLOW_RELEASE: "false"
        run: |
          echo "🚀 Initializing platform promotion environment..."
          echo "📋 Platform Version: ${{ needs.aggregate.outputs.platform_version }}"
          echo "🎯 Target: DEV → QA → STAGING (PROD handled by separate workflow)"
          
          source bookverse-infra/libraries/bookverse-devops/scripts/evidence-lib.sh
          setup_promotion_environment
          
          echo "✅ Promotion environment initialized"

      - name: "[Promote & Evidence] DEV Stage"
        env:
          APPLICATION_KEY: "bookverse-platform"
          APP_VERSION: "${{ needs.aggregate.outputs.platform_version }}"
          JFROG_URL: "${{ vars.JFROG_URL }}"
          PROJECT_KEY: "${{ vars.PROJECT_KEY }}"
          JF_OIDC_TOKEN: "${{ steps.jfrog-cli-auth.outputs.oidc-token }}"
          STAGES_STR: "DEV QA STAGING"
          FINAL_STAGE: "STAGING"
          ALLOW_RELEASE: "false"
          EVIDENCE_PRIVATE_KEY: ${{ secrets.EVIDENCE_PRIVATE_KEY }}
          EVIDENCE_KEY_ALIAS: ${{ vars.EVIDENCE_KEY_ALIAS }}
          APPTRUST_TIMEOUT_SECONDS: 300
        run: |
          echo "🧪 Promoting platform to DEV stage with evidence collection"
          echo "📋 Platform Version: $APP_VERSION"
          echo "🎯 Target Stage: DEV (development environment for platform testing)"
          echo "🛡️ Evidence Type: Platform aggregation validation and smoke tests"
          
          if [[ -z "${JF_OIDC_TOKEN:-}" ]]; then
            echo "❌ Missing JF_OIDC_TOKEN. Ensure OIDC exchange step succeeded." >&2
            exit 1
          fi
          echo "✅ Using JF_OIDC_TOKEN for DEV promotion"
          
          source bookverse-infra/libraries/bookverse-devops/scripts/evidence-lib.sh
          setup_promotion_environment
          
          if advance_one_step; then
            echo "✅ Successfully promoted platform to DEV"
          else
            echo "❌ Failed to promote platform to DEV"
            exit 1
          fi
          
          # Attach platform-specific DEV evidence
          attach_application_dev_evidence
          echo "✅ DEV stage evidence attached via shared library: platform-smoke-tests"

      - name: "[Promote & Evidence] QA Stage"
        env:
          APPLICATION_KEY: "bookverse-platform"
          APP_VERSION: "${{ needs.aggregate.outputs.platform_version }}"
          JFROG_URL: "${{ vars.JFROG_URL }}"
          PROJECT_KEY: "${{ vars.PROJECT_KEY }}"
          JF_OIDC_TOKEN: "${{ steps.jfrog-cli-auth.outputs.oidc-token }}"
          STAGES_STR: "DEV QA STAGING"
          FINAL_STAGE: "STAGING"
          ALLOW_RELEASE: "false"
          EVIDENCE_PRIVATE_KEY: ${{ secrets.EVIDENCE_PRIVATE_KEY }}
          EVIDENCE_KEY_ALIAS: ${{ vars.EVIDENCE_KEY_ALIAS }}
          APPTRUST_TIMEOUT_SECONDS: 300
        run: |
          echo "🔍 Promoting platform to QA stage with evidence collection"
          echo "📋 Platform Version: $APP_VERSION"
          echo "🎯 Target Stage: QA (quality assurance for platform integration)"
          echo "🛡️ Evidence Type: Platform integration tests and service compatibility validation"
          
          if [[ -z "${JF_OIDC_TOKEN:-}" ]]; then
            echo "❌ Missing JF_OIDC_TOKEN. Ensure OIDC exchange step succeeded." >&2
            exit 1
          fi
          echo "✅ Using JF_OIDC_TOKEN for QA promotion"
          
          source bookverse-infra/libraries/bookverse-devops/scripts/evidence-lib.sh
          setup_promotion_environment
          
          if advance_one_step; then
            echo "✅ Successfully promoted platform to QA"
          else
            echo "❌ Failed to promote platform to QA"
            exit 1
          fi
          
          # Attach platform-specific QA evidence
          attach_application_qa_evidence
          echo "✅ QA stage evidence attached via shared library: platform-integration-tests, service-compatibility-scan"

      - name: "[Promote & Evidence] STAGING Stage"
        env:
          APPLICATION_KEY: "bookverse-platform"
          APP_VERSION: "${{ needs.aggregate.outputs.platform_version }}"
          JFROG_URL: "${{ vars.JFROG_URL }}"
          PROJECT_KEY: "${{ vars.PROJECT_KEY }}"
          JF_OIDC_TOKEN: "${{ steps.jfrog-cli-auth.outputs.oidc-token }}"
          STAGES_STR: "DEV QA STAGING"
          FINAL_STAGE: "STAGING"
          ALLOW_RELEASE: "false"
          EVIDENCE_PRIVATE_KEY: ${{ secrets.EVIDENCE_PRIVATE_KEY }}
          EVIDENCE_KEY_ALIAS: ${{ vars.EVIDENCE_KEY_ALIAS }}
          APPTRUST_TIMEOUT_SECONDS: 300
        run: |
          echo "🏗️ Promoting platform to STAGING stage with evidence collection"
          echo "📋 Platform Version: $APP_VERSION"
          echo "🎯 Target Stage: STAGING (pre-production platform validation)"
          echo "🛡️ Evidence Type: Platform performance tests and production readiness validation"
          
          if [[ -z "${JF_OIDC_TOKEN:-}" ]]; then
            echo "❌ Missing JF_OIDC_TOKEN. Ensure OIDC exchange step succeeded." >&2
            exit 1
          fi
          echo "✅ Using JF_OIDC_TOKEN for STAGING promotion"
          
          source bookverse-infra/libraries/bookverse-devops/scripts/evidence-lib.sh
          setup_promotion_environment
          
          if advance_one_step; then
            echo "✅ Successfully promoted platform to STAGING"
          else
            echo "❌ Failed to promote platform to STAGING"
            exit 1
          fi
          
          # Attach platform-specific STAGING evidence
          attach_application_staging_evidence
          echo "✅ STAGING stage evidence attached via shared library: platform-performance-test, production-readiness-scan"
          echo "🎉 Platform version $APP_VERSION successfully promoted to STAGING with all evidence!"
          echo "🔄 Use separate release workflow to promote to PROD when ready"

      - name: "📊 Enhanced Platform Summary (bookverse-devops pattern)"
        if: always()
        run: |
          echo "📊 Generating comprehensive platform aggregation and promotion summary for stakeholder visibility"
          echo "🎯 This summary provides complete aggregation status, service versions, and deployment readiness"
          
          echo "## 🏗️ BookVerse Platform - Aggregation & Promotion Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📋 Platform Information" >> $GITHUB_STEP_SUMMARY
          echo "- **Service:** platform (aggregation service)" >> $GITHUB_STEP_SUMMARY
          echo "- **Platform Version:** \`${{ needs.aggregate.outputs.platform_version }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Workflow Type:** Aggregation & Auto-Promotion" >> $GITHUB_STEP_SUMMARY
          echo "- **Trigger:** ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          echo "### ✅ AppTrust Compliance Status" >> $GITHUB_STEP_SUMMARY
          echo "- **Job 1 (aggregate):** ✅ Completed - Service versions collected and platform version created" >> $GITHUB_STEP_SUMMARY
          if [[ "${{ needs.aggregate.outputs.manifest_created }}" == "true" ]]; then
            echo "- **Job 2 (promote):** ✅ Completed - Platform promoted through all stages to STAGING" >> $GITHUB_STEP_SUMMARY
          else
            echo "- **Job 2 (promote):** ⏭️ Skipped (preview mode or creation disabled)" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          
          echo "### 🔗 Aggregated Service Versions" >> $GITHUB_STEP_SUMMARY
          echo "Platform aggregates the following service application versions from PROD stage:" >> $GITHUB_STEP_SUMMARY
          echo "- **📦 Inventory Service:** \`${{ inputs.inventory_version || 'Latest from PROD' }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **🎯 Recommendations Service:** \`${{ inputs.recommendations_version || 'Latest from PROD' }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **💳 Checkout Service:** \`${{ inputs.checkout_version || 'Latest from PROD' }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **🌐 Web Service:** \`${{ inputs.web_version || 'Latest from PROD' }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **📋 Platform Manifest:** ✅ Generated with service dependencies" >> $GITHUB_STEP_SUMMARY
          echo "- **🔗 Platform Application Version:** ✅ Created in AppTrust with source links" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [[ "${{ needs.aggregate.outputs.manifest_created }}" == "true" ]]; then
            echo "### 🎯 Promotion Path & Evidence" >> $GITHUB_STEP_SUMMARY
            echo "Platform follows step-by-step promotion with comprehensive evidence collection:" >> $GITHUB_STEP_SUMMARY
            echo "- ✅ **UNASSIGNED → DEV**: Platform aggregation validation and smoke tests" >> $GITHUB_STEP_SUMMARY
            echo "- ✅ **DEV → QA**: Integration tests and service compatibility validation" >> $GITHUB_STEP_SUMMARY
            echo "- ✅ **QA → STAGING**: Performance tests and production readiness validation" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            
            echo "### 🛡️ Evidence Artifacts" >> $GITHUB_STEP_SUMMARY
            echo "- **DEV Evidence:** platform-smoke-tests" >> $GITHUB_STEP_SUMMARY
            echo "- **QA Evidence:** platform-integration-tests, service-compatibility-scan" >> $GITHUB_STEP_SUMMARY
            echo "- **STAGING Evidence:** platform-performance-test, production-readiness-scan" >> $GITHUB_STEP_SUMMARY
            echo "- **Evidence Collection:** ✅ Cryptographically signed and uploaded" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
          fi
          
          echo "### 🚀 Platform Optimizations Applied" >> $GITHUB_STEP_SUMMARY
          echo "- **bookverse-devops:** ✅ Shared OIDC authentication & promotion patterns" >> $GITHUB_STEP_SUMMARY
          echo "- **Service Aggregation:** ✅ Automated collection from PROD stage releases" >> $GITHUB_STEP_SUMMARY
          echo "- **Step-by-step Promotion:** ✅ Individual stage promotion with evidence" >> $GITHUB_STEP_SUMMARY
          echo "- **Compliance Evidence:** ✅ Comprehensive audit trail for each stage" >> $GITHUB_STEP_SUMMARY
          echo "- **Platform-specific Logic:** ✅ Custom aggregation without package versioning" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [[ "${{ needs.aggregate.outputs.manifest_created }}" == "true" ]]; then
            echo "### 🎯 Platform Deployment Status" >> $GITHUB_STEP_SUMMARY
            echo "Platform version **\`${{ needs.aggregate.outputs.platform_version }}\`** has been created and promoted to **STAGING**." >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**🔄 Next Steps:**" >> $GITHUB_STEP_SUMMARY
            echo "- Platform is ready for STAGING validation and testing" >> $GITHUB_STEP_SUMMARY
            echo "- Use separate **Release** workflow to promote to PROD when ready" >> $GITHUB_STEP_SUMMARY
            echo "- PROD promotion requires manual approval and additional compliance validation" >> $GITHUB_STEP_SUMMARY
          else
            echo "### 📋 Preview Mode" >> $GITHUB_STEP_SUMMARY
            echo "Platform aggregation ran in preview mode - no versions created or promoted." >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**🔄 Next Steps:**" >> $GITHUB_STEP_SUMMARY
            echo "- Run workflow with \`create_version=true\` to create platform application version" >> $GITHUB_STEP_SUMMARY
            echo "- Ensure \`auto_promote=true\` to enable automatic promotion to STAGING" >> $GITHUB_STEP_SUMMARY
          fi
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ Enhanced platform summary generated using bookverse-devops patterns" >> $GITHUB_STEP_SUMMARY
